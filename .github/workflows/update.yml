name: Daily Arecanut Update

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Data File
        run: |
          mkdir -p data

          cat > data/latest.json << EOF
          {
            "date":"2026-07-08",
            "market":"ಚನ್ನಗಿರಿ",
            "price":61000,
            "indiaArrival":22000,
            "karnatakaArrival":14000,
            "prediction":"ಹೆಚ್ಚು"
          }
          EOF

      - name: Commit Changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .

          git commit -m "Daily Update" || exit 0

          git push
